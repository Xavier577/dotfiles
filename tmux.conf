set-option -g mouse on

# Allow passthrough escape sequences (needed for iTerm2 image paste in Claude Code, etc.)
set -g allow-passthrough on

# Forward focus events to applications
set -g focus-events on

# True color + extended capabilities
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",xterm-256color:RGB"

# Increase escape sequence timeout for large pastes (like images)
set -sg escape-time 0
set -g extended-keys on

# Larger history
set -g history-limit 50000
